[supervisord]
nodaemon=true
logfile=/dev/null
pidfile=/tmp/supervisord.pid

[program:web]
directory=/app
environment=REFLEX_ENV_MODE="prod",__REFLEX_MOUNT_FRONTEND_COMPILED_APP="true",__REFLEX_SKIP_COMPILE="true"
command=sh -lc 'exec python3 -m gunicorn --preload --worker-class uvicorn.workers.UvicornH11Worker --bind \"0.0.0.0:${PORT:-8080}\" --workers \"${WEB_CONCURRENCY:-1}\" --log-level error \"alphavault_reflex.alphavault_reflex:app()\"'
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:weibo_rss_turso_worker]
directory=/app
command=python3 -u weibo_rss_turso_worker.py --active-hours "%(ENV_WORKER_ACTIVE_HOURS)s" --verbose --interval-seconds %(ENV_WORKER_INTERVAL_SECONDS)s --worker-threads 30
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
