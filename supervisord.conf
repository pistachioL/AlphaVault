[supervisord]
nodaemon=true
logfile=/dev/null
pidfile=/tmp/supervisord.pid

[program:web]
directory=/app
command=streamlit run streamlit_app.py --server.port=8080 --server.address=0.0.0.0
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:crawler]
directory=/app
command=python -u crawler.py
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:weibo_rss_incremental]
directory=/app
command=python3 -u weibo_rss_incremental.py --db-path /data/workdb.sqlite --rss-url "%(ENV_RSS_URL)s" --author "挖地瓜的超级鹿鼎公" --user-id 3962719063 --api-type openai --base-url %(ENV_OPENAI_BASE_URL)s --api-key %(ENV_OPENAI_API_KEY)s --ai-stream --api-mode responses --model openai/gpt-5.2 --ai-timeout-sec 1000 --ai-reasoning-effort xhigh --ai-rpm 12 --ai-retries 11 --ai-max-inflight 30 --trace-out /data/trace.txt --verbose --progress-every 1 --interval-seconds 600 --worker-threads 30
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:sync_turso]
directory=/app
command=python3 -u sync_workdb_to_turso.py --local-db /data/workdb.sqlite --turso-url %(ENV_TURSO_DATABASE_URL)s --turso-token %(ENV_TURSO_AUTH_TOKEN)s --batch-size 200 --interval-seconds 600 --verbose
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
