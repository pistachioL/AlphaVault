[supervisord]
nodaemon=true
logfile=/dev/null
pidfile=/tmp/supervisord.pid

[program:web]
directory=/app
environment=REFLEX_ENV_MODE="prod",__REFLEX_MOUNT_FRONTEND_COMPILED_APP="true",__REFLEX_SKIP_COMPILE="true"
command=python3 -m uvicorn --host 0.0.0.0 --port %(ENV_PORT)s --log-level info --access-log --factory alphavault_reflex.alphavault_reflex:app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:weibo_rss_worker]
directory=/app
command=python3 -u weibo_rss_worker.py --active-hours "%(ENV_WORKER_ACTIVE_HOURS)s" --log-level info --interval-seconds %(ENV_WORKER_INTERVAL_SECONDS)s
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
